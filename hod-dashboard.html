 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Dashboard - JPTS University</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #fd7e14; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { width: 260px; background: white; position: fixed; height: 100%; padding: 20px; }
        .sidebar-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 10px; }
        .sidebar-item:hover, .sidebar-item.active { background: #fd7e14; color: white; }
        .main-content { margin-left: 280px; padding: 25px; }
        .data-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .btn-success { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-danger { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .sidebar { margin-left: -260px; } .main-content { margin-left: 0; } }
        .toast-msg { position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 300px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div><i class="fas fa-building"></i> JPTS University - HOD Portal</div>
        <div><span id="hodName"></span> <button class="btn-logout ms-3" id="logoutBtn">Logout</button></div>
    </div>
    
    <div class="sidebar">
        <h5 class="text-center mb-3">HOD Menu</h5>
        <div class="sidebar-item active" onclick="loadDashboard()">Dashboard</div>
        <div class="sidebar-item" onclick="loadPendingApprovals()">Pending Approvals</div>
        <div class="sidebar-item" onclick="loadApprovedScores()">Approved Scores</div>
    </div>
    
    <div class="main-content" id="mainContent">
        <div class="text-center py-5"><div class="spinner-border text-primary"></div><p>Loading...</p></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'hod') window.location.href = 'login.html';
        document.getElementById('hodName').innerHTML = currentUser.name;
        
        let pendingScores = JSON.parse(localStorage.getItem('pending_scores')) || [];
        let approvedScores = JSON.parse(localStorage.getItem('approved_scores')) || [];
        
        function showMessage(msg, type) {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} toast-msg`;
            toast.innerHTML = msg + '<button type="button" class="btn-close float-end" data-bs-dismiss="alert"></button>';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function saveData() {
            localStorage.setItem('pending_scores', JSON.stringify(pendingScores));
            localStorage.setItem('approved_scores', JSON.stringify(approvedScores));
        }
        
        function loadDashboard() {
            document.getElementById('mainContent').innerHTML = `
                <div class="data-card">
                    <h5>HOD Dashboard</h5>
                    <p>Welcome, ${currentUser.name}!</p>
                    <p>Scores Pending Approval: ${pendingScores.length}</p>
                    <p>Scores Approved: ${approvedScores.length}</p>
                    <button class="btn-success" onclick="loadPendingApprovals()">Review Pending Scores</button>
                </div>
            `;
        }
        
        function loadPendingApprovals() {
            if (pendingScores.length === 0) {
                document.getElementById('mainContent').innerHTML = `<div class="data-card"><div class="alert alert-success">No pending scores. All scores have been approved.</div></div>`;
                return;
            }
            
            let html = `<div class="data-card"><h5>Scores Pending Approval</h5>
                        <div class="table-responsive"><table class="table"><thead>
                        <tr><th>Student</th><th>Course</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th><th>Lecturer</th><th>Actions</th>
                        </thead><tbody>`;
            
            pendingScores.forEach((score, index) => {
                html += `<tr>
                    <td>${score.studentName}</p></div>
                    <td>${score.courseCode}</p></div>
                    <td>${score.ca}</p></div>
                    <td>${score.exam}</p></div>
                    <td><strong>${score.total}</strong></p></div>
                    <td><span class="badge bg-primary">${score.grade}</span></p></div>
                    <td>${score.lecturerId || 'N/A'}</p></div>
                    <td><button class="btn-success" onclick="approveScore(${index})">Approve</button> <button class="btn-danger" onclick="rejectScore(${index})">Reject</button></p></div>
                </tr>`;
            });
            html += `</tbody>}</div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        
        function approveScore(index) {
            const approved = { ...pendingScores[index], status: "approved", approvedBy: currentUser.id, approvedDate: new Date().toISOString() };
            approvedScores.push(approved);
            pendingScores.splice(index, 1);
            saveData();
            showMessage("Score approved! Exam Officer can now publish.", "success");
            loadPendingApprovals();
        }
        
        function rejectScore(index) {
            pendingScores.splice(index, 1);
            saveData();
            showMessage("Score rejected. Lecturer needs to re-enter.", "warning");
            loadPendingApprovals();
        }
        
        function loadApprovedScores() {
            if (approvedScores.length === 0) {
                document.getElementById('mainContent').innerHTML = `<div class="data-card"><div class="alert alert-info">No approved scores yet.</div></div>`;
                return;
            }
            
            let html = `<div class="data-card"><h5>Approved Scores (Ready for Publication)</h5>
                        <div class="table-responsive"><table class="table"><thead>
                        <tr><th>Student</th><th>Course</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th><th>Approved By</th>
                        </thead><tbody>`;
            approvedScores.forEach(score => {
                html += `<tr>
                    <td>${score.studentName}</p></div>
                    <td>${score.courseCode}</p></div>
                    <td>${score.ca}</p></div>
                    <td>${score.exam}</p></div>
                    <td><strong>${score.total}</strong></p></div>
                    <td><span class="badge bg-success">${score.grade}</span></p></div>
                    <td>${score.approvedBy}</p></div>
                </tr>`;
            });
            html += `</tbody>}</div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; });
        loadDashboard();
    </script>
</body>
</html>
