        .main-content { margin-left: 280px; padding: 25px; }

        .stat-card { background: white; border-radius: 15px; padding: 20px; text-align: center; display: inline-block; width: 23%; margin: 1%; cursor: pointer; transition: 0.3s; }

        .stat-card h2 { font-size: 32px; color: #0a1e3c; margin: 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .grade-A { background: #28a745; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .grade-B { background: #17a2b8; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .grade-C { background: #ffc107; color: #333; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .grade-D { background: #fd7e14; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .grade-E { background: #dc3545; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .grade-F { background: #6c757d; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding: 10px; }
        .course-item { background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; cursor: pointer; transition: 0.3s; }
        .course-item:hover { background: #e8eaf0; transform: translateX(5px); }
        .course-item.selected { background: #0a1e3c; color: white; }
        .course-code { font-weight: 700; font-size: 16px; }
        .course-title { font-size: 13px; color: #666; }
        .course-credit { font-size: 11px; color: #28a745; }
        .course-item.selected .course-title { color: #ccc; }
        .course-item.selected .course-credit { color: #ffd700; }
        .btn-primary { background: #0a1e3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-success { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-info { background: #17a2b8; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .search-box { position: relative; margin-bottom: 20px; }

            { code: "ARC402", title: "Architecture Project", credit: 6, dept: "Architecture", level: "400" }
        ];
        
        let registeredCourses = JSON.parse(localStorage.getItem('registeredCourses')) || [];
        let publishedResults = JSON.parse(localStorage.getItem('published_results')) || [];
        let myResults = publishedResults.filter(r => r.studentId === currentUser.id);
        let notifications = JSON.parse(localStorage.getItem('student_notifications')) || [];
        
        function showMessage(msg, type) {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} toast-msg`;
            toast.innerHTML = msg + '<button type="button" class="btn-close float-end" data-bs-dismiss="alert"></button>';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function calculateGrade(score) {
            if (score >= 70) return { grade: 'A', point: 5.0 };
            if (score >= 60) return { grade: 'B', point: 4.0 };
            if (score >= 50) return { grade: 'C', point: 3.0 };
            if (score >= 45) return { grade: 'D', point: 2.0 };
            if (score >= 40) return { grade: 'E', point: 1.0 };
            return { grade: 'F', point: 0.0 };
        }
        
        function loadDashboard() {
            let totalPoints = 0, totalCredits = 0;
            myResults.forEach(r => {
                totalPoints += r.point * r.credit;
                totalCredits += r.credit;
            });
            const cgpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : 0;
            
            document.getElementById('mainContent').innerHTML = `
                <div class="data-card">
                    <h5>Welcome, ${currentUser.name}!</h5>
                    <div class="row">
                        <div class="col-md-3"><div class="stat-card" onclick="loadResults()"><h2>${myResults.length}</h2><p>Courses Taken</p><small>Click to view</small></div></div>
                        <div class="col-md-3"><div class="stat-card" onclick="loadResults()"><h2>${cgpa}</h2><p>CGPA</p><small>Click to view</small></div></div>
                        <div class="col-md-3"><div class="stat-card" onclick="loadCourses()"><h2>${registeredCourses.length}</h2><p>Registered Courses</p><small>Click to register</small></div></div>
                        <div class="col-md-3"><div class="stat-card"><h2>Paid</h2><p>Fee Status</p><small>All good</small></div></div>
                    </div>
                </div>
                <div class="data-card">
                    <h5>Quick Actions</h5>
                    <button class="btn-primary" onclick="loadCourses()"><i class="fas fa-book me-2"></i>Register Courses</button>
                    <button class="btn-success" onclick="loadResults()"><i class="fas fa-chart-line me-2"></i>View Results</button>
                    <button class="btn-info" onclick="loadTranscript()"><i class="fas fa-file-pdf me-2"></i>Download Transcript</button>
                </div>
                <div class="data-card">
                    <h5>Latest Announcements</h5>
                    <ul>
                        <li>Results are published by the Examination Office</li>
                        <li>Contact your HOD for result complaints</li>
                        <li>Course registration deadline: December 15th, 2024</li>
                        <li>Transcripts available upon request</li>
                    </ul>
                </div>
            `;
        }
        
        function loadResults() {
            if (myResults.length === 0) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="data-card">
                        <h5>My Results</h5>
                        <div class="alert alert-info">No results published yet. Results appear here after Examination Officer publishes them.</div>
                    </div>
                `;
                return;
            }
            
            let totalPoints = 0, totalCredits = 0;
            let html = `<div class="data-card"><h5>My Results</h5>
                        <div class="table-responsive"><table class="table"><thead>
                        <tr><th>Course Code</th><th>Course Title</th><th>Credit</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th><th>GP</th>
                        </thead><tbody>`;
            
            myResults.forEach(r => {
                html += `<tr>
                    <td><strong>${r.courseCode}</strong></td>
                    <td>${r.courseTitle}</td>
                    <td>${r.credit}</td>
                    <td>${r.ca}</td>
                    <td>${r.exam}</td>
                    <td><strong>${r.total}</strong></td>
                    <td><span class="grade-${r.grade}">${r.grade}</span></td>
                    <td>${r.point}</td>
                </tr>`;
                totalPoints += r.point * r.credit;
                totalCredits += r.credit;
            });
            const cgpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : 0;
            html += `</tbody>} He
            <div class="alert alert-info mt-3"><strong>CGPA: ${cgpa}</strong> | Total Credits: ${totalCredits}</div>
            <button class="btn-primary" onclick="loadTranscript()"><i class="fas fa-file-pdf me-2"></i>Download Full Transcript</button>
            <button class="btn-info" onclick="window.print()"><i class="fas fa-print me-2"></i>Print Results</button>
            </div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        
        let currentPage = 1;
        let itemsPerPage = 8;
        
        function renderCourses() {
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = allCourses.slice(start, start + itemsPerPage);
            const totalPages = Math.ceil(allCourses.length / itemsPerPage);
            
            let html = `<div class="data-card"><h5>Course Registration (${allCourses.length} courses available)</h5>
                        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchCourseInput" class="form-control" placeholder="Search courses by code or title..."></div>
                        <div class="courses-grid" id="coursesGrid">`;
            
            paginated.forEach(course => {
                const isRegistered = registeredCourses.includes(course.code);
                html += `
                    <div class="course-item ${isRegistered ? 'selected' : ''}" onclick="toggleCourse('${course.code}')">
                        <div class="course-code">${course.code}</div>
                        <div class="course-title">${course.title}</div>
                        <div class="course-credit">${course.credit} Credits | ${course.dept}</div>
                        ${isRegistered ? '<span class="badge bg-success mt-2">✓ Registered</span>' : '<span class="badge bg-secondary mt-2">Available</span>'}
                    </div>
                `;
            });
            
            html += `</div>
                    <div class="pagination">
                        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
                        <span>Page ${currentPage} of ${totalPages}</span>
                        <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
                    </div>
                    <div class="mt-3">
                        <strong>Registered: ${registeredCourses.length} courses</strong>
                        <button class="btn-success float-end" onclick="submitRegistration()">Submit Registration</button>
                        <button class="btn-danger float-end me-2" onclick="clearAllRegistration()">Clear All</button>
                    </div>
                </div>`;
            document.getElementById('mainContent').innerHTML = html;
            
            document.getElementById('searchCourseInput').addEventListener('keyup', function() {
                const term = this.value.toLowerCase();
                const filtered = allCourses.filter(c => c.code.toLowerCase().includes(term) || c.title.toLowerCase().includes(term));
                const filteredHtml = filtered.map(course => `
                    <div class="course-item ${registeredCourses.includes(course.code) ? 'selected' : ''}" onclick="toggleCourse('${course.code}')">
                        <div class="course-code">${course.code}</div>
                        <div class="course-title">${course.title}</div>
                        <div class="course-credit">${course.credit} Credits | ${course.dept}</div>
                        ${registeredCourses.includes(course.code) ? '<span class="badge bg-success mt-2">Registered</span>' : '<span class="badge bg-secondary mt-2">Available</span>'}
                    </div>
                `).join('');
                document.getElementById('coursesGrid').innerHTML = filteredHtml || '<div class="text-center">No courses found</div>';
            });
        }
        
        function loadCourses() {
            currentPage = 1;
            renderCourses();
        }
        
        function changePage(newPage) {
            if (newPage < 1 || newPage > Math.ceil(allCourses.length / itemsPerPage)) return;
            currentPage = newPage;
            renderCourses();
        }
        
        function toggleCourse(courseCode) {
            const index = registeredCourses.indexOf(courseCode);
            if (index === -1) {
                registeredCourses.push(courseCode);
                showMessage(`${courseCode} added to registration`, 'success');
            } else {
                registeredCourses.splice(index, 1);
                showMessage(`${courseCode} removed from registration`, 'warning');
            }
            localStorage.setItem('registeredCourses', JSON.stringify(registeredCourses));
            renderCourses();
        }
        
        function submitRegistration() {
            showMessage(`${registeredCourses.length} courses registered successfully!`, 'success');
            notifications.unshift({ id: Date.now(), title: "Registration Confirmed", message: `You have registered for ${registeredCourses.length} courses.`, date: new Date().toISOString(), read: false });
            localStorage.setItem('student_notifications', JSON.stringify(notifications));
        }
        
        function clearAllRegistration() {
            if (confirm('Clear all registered courses?')) {
                registeredCourses = [];
                localStorage.setItem('registeredCourses', JSON.stringify(registeredCourses));
                showMessage('All courses cleared', 'warning');
                renderCourses();
            }
        }
        
        function loadTranscript() {
            if (myResults.length === 0) {
                document.getElementById('mainContent').innerHTML = `<div class="data-card"><h5>Transcript</h5><div class="alert alert-warning">No results published yet. Transcript will be available after results are published.</div></div>`;
                return;
            }
            
            let totalPoints = 0, totalCredits = 0;
            let html = `<div class="data-card"><h5>Official Transcript</h5>
                        <div id="transcriptContent">
                            <div class="text-center"><h2>JPTS UNIVERSITY</h2><h4>Official Academic Transcript</h4><hr></div>
                            <p><strong>Name:</strong> ${currentUser.name}</p>
                            <p><strong>Matric Number:</strong> ${currentUser.id}</p>
                            <p><strong>Department:</strong> ${currentUser.dept || 'Computer Science'}</p>
                            <hr>
                            <table class="table table-bordered">
                                <thead class="table-dark"><tr><th>Course</th><th>Credit</th><th>Score</th><th>Grade</th><th>GP</th></tr></thead>
                                <tbody>`;
            
            myResults.forEach(r => {
                html += `<tr><td class="text-center">${r.courseCode} - ${r.courseTitle}</p></div><td class="text-center">${r.credit}</p></div><td class="text-center">${r.total}</p></div><td class="text-center">${r.grade}</p></div><td class="text-center">${r.point}</p></div></tr>`;
                totalPoints += r.point * r.credit;
                totalCredits += r.credit;
            });
            const cgpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : 0;
            html += `</tbody></table><div class="alert alert-info mt-3"><strong>CGPA: ${cgpa}</strong></div>
                    <div class="text-center mt-4"><p>Generated on ${new Date().toLocaleDateString()}</p></div>
                    </div>
                    <button class="btn-danger mt-3" onclick="alert('PDF Transcript would download here')">Download PDF Transcript</button>
                    </div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        
        function loadProfile() {
            document.getElementById('mainContent').innerHTML = `
                <div class="data-card">
                    <h5>My Profile</h5>
                    <div class="row">
                        <div class="col-md-4 text-center">
                            <div style="width:120px;height:120px;background:#0a1e3c;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;color:white;font-size:48px"><i class="fas fa-user-graduate"></i></div>
                        </div>
                        <div class="col-md-8">
                            <table class="table">
                                <tr><th>Full Name</th><td>${currentUser.name}</p></div>
                                <tr><th>Matric Number</th><td>${currentUser.id}</p></div>
                                <tr><th>Email</th><td>${currentUser.email}</p></div>
                                <tr><th>Department</th><td>${currentUser.dept || 'Not set'}</p></div>
                                <tr><th>Role</th><td>${currentUser.role}</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function loadNotifications() {
            let html = `<div class="data-card"><h5>Notifications</h5><div id="notificationsList">`;
            if (notifications.length === 0) {
                html += '<div class="text-center py-3 text-muted">No notifications</div>';
            } else {
                notifications.slice().reverse().forEach(notif => {
                    html += `<div class="notification-item" style="padding:12px;border-bottom:1px solid #eee">
                                <div><strong>${notif.title}</strong> <small class="text-muted float-end">${new Date(notif.date).toLocaleDateString()}</small></div>
                                <div>${notif.message}</div>
                            </div>`;
                });
            }
            html += `</div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        });
        
        loadDashboard();
    </script>
</body>
</html>
