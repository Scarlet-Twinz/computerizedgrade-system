<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPTS University - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a1e3c, #1a3a6c);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header i { font-size: 60px; color: #0a1e3c; }
        .login-header h2 { margin-top: 10px; }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            width: 100%;
            border: 1px solid #ddd;
        }
        .btn-login {
            background: #0a1e3c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
        .nav-tabs .nav-link.active {
            color: #0a1e3c;
            border-bottom: 3px solid #0a1e3c;
            font-weight: bold;
        }
        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .role-card {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            background: white;
            transition: 0.3s;
        }
        .role-card i { font-size: 20px; margin-bottom: 5px; display: block; }
        .role-card span { font-size: 12px; }
        .role-card:hover { transform: translateY(-3px); border-color: #c49a2c; }
        .role-card.selected {
            border-color: #0a1e3c;
            background: #0a1e3c;
            color: white;
        }
        .toast-msg {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
            animation: slideIn 0.3s ease;
            border-radius: 10px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .forgot-link { text-align: center; margin-top: 15px; }
        .forgot-link a { color: #888; font-size: 13px; text-decoration: none; cursor: pointer; }
        .modal-content { border-radius: 15px; }
        .security-question { display: none; margin-top: 10px; }
        .security-question.show { display: block; }
        @media (max-width: 768px) {
            .role-card i { font-size: 16px; }
            .role-card span { font-size: 10px; }
            .login-card { padding: 25px; }
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="fas fa-graduation-cap"></i>
        <h2>JPTS University</h2>
        <p>Result Management System</p>
    </div>
    
    <ul class="nav nav-tabs mb-4" id="authTab">
        <li class="nav-item w-50"><a class="nav-link active" data-bs-toggle="tab" href="#loginTab">Login</a></li>
        <li class="nav-item w-50"><a class="nav-link" data-bs-toggle="tab" href="#signupTab">Sign Up</a></li>
    </ul>
    
    <div class="tab-content">
        <!-- LOGIN TAB -->
        <div class="tab-pane fade show active" id="loginTab">
            <div class="role-selector" id="loginRoleSelector">
                <div class="role-card" data-role="student"><i class="fas fa-user-graduate"></i><span>Student</span></div>
                <div class="role-card" data-role="lecturer"><i class="fas fa-chalkboard-user"></i><span>Lecturer</span></div>
                <div class="role-card" data-role="hod"><i class="fas fa-building"></i><span>HOD</span></div>
                <div class="role-card" data-role="exam_officer"><i class="fas fa-clipboard-list"></i><span>Exam Officer</span></div>
                <div class="role-card" data-role="admin"><i class="fas fa-user-shield"></i><span>Admin</span></div>
            </div>
            <form id="loginForm">
                <input type="text" id="loginEmail" class="form-control" placeholder="Email or Matric Number" required>
                <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
                <button type="submit" class="btn-login">Login</button>
                <div class="forgot-link"><a id="forgotPasswordBtn">Forgot Password?</a></div>
            </form>
            
            <!-- Forgot Password Section -->
            <div id="forgotPasswordSection" style="display: none; margin-top: 20px;">
                <h6 class="text-center mb-3"><i class="fas fa-key me-2"></i>Reset Password</h6>
                <p class="text-muted text-center small">Answer your security question to reset your password</p>
                <div id="securityQuestionDisplay" class="alert alert-info text-center" style="font-weight: 500;"></div>
                <input type="text" id="securityAnswerInput" class="form-control" placeholder="Your answer">
                <input type="password" id="newPasswordInput" class="form-control" placeholder="New Password (min 6 chars)">
                <input type="password" id="confirmNewPasswordInput" class="form-control" placeholder="Confirm New Password">
                <button class="btn-login" id="resetPasswordBtn" style="background: #c49a2c; color: #0a1e3c; margin-top: 10px;">
                    <i class="fas fa-save me-2"></i>Reset Password
                </button>
                <button class="btn-login" id="cancelResetBtn" style="background: #6c757d; color: white; margin-top: 10px;">
                    <i class="fas fa-arrow-left me-2"></i>Back to Login
                </button>
            </div>
        </div>
        
        <!-- SIGNUP TAB -->
        <div class="tab-pane fade" id="signupTab">
            <form id="signupForm">
                <input type="text" id="signupName" class="form-control" placeholder="Full Name" required>
                <input type="email" id="signupEmail" class="form-control" placeholder="Email Address" required>
                <input type="text" id="signupNumber" class="form-control" placeholder="Matric/Staff Number" required>
                <select id="signupRole" class="form-select" required>
                    <option value="student">Student</option>
                    <option value="lecturer">Lecturer</option>
                    <option value="hod">Head of Department</option>
                    <option value="exam_officer">Examination Officer</option>
                    <option value="admin">Administrator</option>
                </select>
                <select id="signupDept" class="form-select" required>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Business">Business Administration</option>
                    <option value="Accounting">Accounting</option>
                    <option value="Law">Law</option>
                    <option value="Economics">Economics</option>
                </select>
                <input type="password" id="signupPassword" class="form-control" placeholder="Password (min 6 chars)" required>
                <input type="password" id="signupConfirm" class="form-control" placeholder="Confirm Password" required>
                
                <div class="alert alert-info mt-2" style="font-size: 13px;">
                    <i class="fas fa-shield-alt me-2"></i>
                    <strong>Security Question:</strong> For password recovery
                </div>
                <select id="securityQuestion" class="form-select">
                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                    <option value="What is your pet's name?">What is your pet's name?</option>
                    <option value="What is your favorite food?">What is your favorite food?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is your best friend's name?">What is your best friend's name?</option>
                </select>
                <input type="text" id="securityAnswer" class="form-control" placeholder="Your answer to the security question" required>
                
                <button type="submit" class="btn-login">Create Account</button>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ============================================================
    // 🔥 USER DATABASE (localStorage)
    // ============================================================
    let users = JSON.parse(localStorage.getItem('jpts_users')) || [];
    
    // ✅ CREATE DEFAULT SUPER ADMIN IF NO USERS EXIST
    if (users.length === 0) {
        users = [
            { 
                name: "Super Admin", 
                email: "admin@jpts.edu", 
                password: "admin123", 
                id: "ADMIN001", 
                role: "admin", 
                dept: "Admin",
                securityQuestion: "What is your mother's maiden name?",
                securityAnswer: "admin",
                approved: true,  // ✅ Auto-approved
                created: new Date().toISOString()
            }
        ];
        saveUsers();
    }
    
    function saveUsers() { 
        localStorage.setItem('jpts_users', JSON.stringify(users)); 
    }
    
    let selectedRole = "student";
    let resettingUser = null;
    
    // Role selector
    document.querySelectorAll('#loginRoleSelector .role-card').forEach(card => {
        card.addEventListener('click', function() {
            document.querySelectorAll('#loginRoleSelector .role-card').forEach(c => c.classList.remove('selected'));
            this.classList.add('selected');
            selectedRole = this.getAttribute('data-role');
        });
    });
    document.querySelector('#loginRoleSelector .role-card[data-role="student"]').classList.add('selected');
    
    function showMessage(msg, type) {
        const toast = document.createElement('div');
        toast.className = `alert alert-${type} toast-msg`;
        toast.innerHTML = msg + '<button type="button" class="btn-close float-end" data-bs-dismiss="alert"></button>';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    // ============================================================
    // 📝 SIGNUP (With Approval Logic)
    // ============================================================
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const id = document.getElementById('signupNumber').value.trim().toUpperCase();
        const role = document.getElementById('signupRole').value;
        const dept = document.getElementById('signupDept').value;
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;
        const securityQuestion = document.getElementById('securityQuestion').value;
        const securityAnswer = document.getElementById('securityAnswer').value.trim().toLowerCase();
        
        if (!name || !email || !id || !password || !confirm || !securityAnswer) {
            showMessage('⚠️ Please fill in all fields!', 'danger');
            return;
        }
        
        if (password !== confirm) {
            showMessage('⚠️ Passwords do not match!', 'danger');
            return;
        }
        
        if (password.length < 6) {
            showMessage('⚠️ Password must be at least 6 characters', 'danger');
            return;
        }
        
        if (users.find(u => u.email === email && u.role === role)) {
            showMessage(`❌ This email is already registered as ${role}!`, 'danger');
            return;
        }
        
        if (users.find(u => u.id === id)) {
            showMessage('❌ ID already exists!', 'danger');
            return;
        }
        
        // ✅ APPROVAL LOGIC:
        // Students = auto-approved (true)
        // Staff (lecturer, hod, exam_officer, admin) = pending approval (false)
        const isStudent = role === 'student';
        const approved = isStudent;  // Students = true, Staff = false
        
        const newUser = {
            name,
            email,
            id,
            role,
            dept,
            password,
            securityQuestion,
            securityAnswer,
            approved: approved,
            created: new Date().toISOString()
        };
        
        users.push(newUser);
        saveUsers();
        
        if (isStudent) {
            showMessage(`✅ ${role} account created! You can login immediately.`, 'success');
        } else {
            showMessage(`⏳ ${role} account created! Waiting for Super Admin approval.`, 'warning');
        }
        
        document.getElementById('signupForm').reset();
        document.querySelector('a[href="#loginTab"]').click();
    });
    
    // ============================================================
    // 🔐 LOGIN (With Approval Check)
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const loginInput = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!loginInput || !password) {
            showMessage('⚠️ Please enter both email/ID and password!', 'danger');
            return;
        }
        
        const user = users.find(u => 
            (u.email === loginInput || u.id === loginInput) && 
            u.role === selectedRole
        );
        
        if (!user) {
            showMessage(`❌ No ${selectedRole} account found!`, 'danger');
            return;
        }
        
        if (user.password !== password) {
            showMessage('❌ Incorrect password!', 'danger');
            return;
        }
        
        // ✅ APPROVAL CHECK: Only students and approved staff can login
        if (user.role !== 'student' && !user.approved) {
            showMessage('⏳ Account pending approval by Super Admin. Please wait.', 'warning');
            return;  // ❌ BLOCK LOGIN
        }
        
        localStorage.setItem('currentUser', JSON.stringify(user));
        showMessage(`✅ Welcome ${user.name}! Redirecting...`, 'success');
        
        setTimeout(() => {
            if (user.role === 'admin') window.location.href = 'admin-dashboard.html';
            else if (user.role === 'lecturer') window.location.href = 'lecturer-dashboard.html';
            else if (user.role === 'hod') window.location.href = 'hod-dashboard.html';
            else if (user.role === 'exam_officer') window.location.href = 'exam-officer-dashboard.html';
            else window.location.href = 'student-dashboard.html';
        }, 1500);
    });
    
    // ============================================================
    // 🔑 FORGOT PASSWORD (Security Question)
    // ============================================================
    document.getElementById('forgotPasswordBtn').addEventListener('click', function() {
        const loginInput = document.getElementById('loginEmail').value.trim();
        
        if (!loginInput) {
            showMessage('⚠️ Please enter your email or ID first!', 'warning');
            return;
        }
        
        const user = users.find(u => u.email === loginInput || u.id === loginInput);
        
        if (!user) {
            showMessage('❌ No account found with these credentials!', 'danger');
            return;
        }
        
        resettingUser = user;
        
        document.getElementById('forgotPasswordSection').style.display = 'block';
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('securityQuestionDisplay').textContent = user.securityQuestion || 'What is your mother\'s maiden name?';
        document.getElementById('securityAnswerInput').value = '';
        document.getElementById('newPasswordInput').value = '';
        document.getElementById('confirmNewPasswordInput').value = '';
    });
    
    document.getElementById('resetPasswordBtn').addEventListener('click', function() {
        const answer = document.getElementById('securityAnswerInput').value.trim().toLowerCase();
        const newPassword = document.getElementById('newPasswordInput').value;
        const confirmNewPassword = document.getElementById('confirmNewPasswordInput').value;
        
        if (!answer) { showMessage('⚠️ Please answer your security question!', 'danger'); return; }
        if (!newPassword || !confirmNewPassword) { showMessage('⚠️ Please enter and confirm your new password!', 'danger'); return; }
        if (newPassword !== confirmNewPassword) { showMessage('⚠️ Passwords do not match!', 'danger'); return; }
        if (newPassword.length < 6) { showMessage('⚠️ Password must be at least 6 characters!', 'danger'); return; }
        if (answer !== resettingUser.securityAnswer) { showMessage('❌ Incorrect security answer!', 'danger'); return; }
        
        const userIndex = users.findIndex(u => u.id === resettingUser.id && u.role === resettingUser.role);
        if (userIndex !== -1) {
            users[userIndex].password = newPassword;
            saveUsers();
            showMessage('✅ Password reset successfully! You can now login.', 'success');
            
            document.getElementById('forgotPasswordSection').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loginEmail').value = resettingUser.email;
            document.getElementById('loginPassword').value = '';
            resettingUser = null;
        }
    });
    
    document.getElementById('cancelResetBtn').addEventListener('click', function() {
        document.getElementById('forgotPasswordSection').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        resettingUser = null;
    });
    
    // ============================================================
    // 🧹 Helpers
    // ============================================================
    window.clearUsers = function() {
        localStorage.removeItem('jpts_users');
        localStorage.removeItem('currentUser');
        location.reload();
    };
    
    window.viewUsers = function() {
        console.log('📋 All users:', JSON.parse(localStorage.getItem('jpts_users')) || []);
    };
    
    console.log('🏛️ JPTS University Login System Loaded!');
    console.log('💡 Commands: clearUsers() | viewUsers()');
</script>
</body>
</html>
